{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
            <h2 class="text-2xl font-extrabold text-slate-900 mb-2">Reset Your Password</h2>
            <p class="text-slate-500 text-sm mb-6">
                Enter your member number, phone number, username, or email. If we find a matching
                account with an email on file, we'll send reset instructions there.
            </p>
            <form method="POST" class="space-y-4">
                <input type="text" name="identifier" class="form-input" placeholder="Member number, phone, username, or email" required>
                <button type="submit" class="w-full bg-brand-700 hover:bg-brand-600 text-white font-semibold rounded-xl py-3 transition">
                    Send Reset Link
                </button>
            </form>
            <p class="text-center text-sm text-slate-500 mt-5">
                <a href="{{ url_for('auth.login') }}" class="text-brand-700 font-semibold hover:underline">&larr; Back to login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
