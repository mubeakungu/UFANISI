{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
            <h2 class="text-2xl font-extrabold text-slate-900 mb-6">Set a New Password</h2>
            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">New Password</label>
                    <input type="password" name="password" class="form-input" required minlength="6">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-input" required minlength="6">
                </div>
                <button type="submit" class="w-full bg-brand-700 hover:bg-brand-600 text-white font-semibold rounded-xl py-3 transition">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
